name: Deploy on EC2

on:
  push:
    branches: ["main", "deploy"]
  pull_request:
    branches: ["main", "deploy"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # ✅ Fixed warning (updated to v4)

      - name: Use Node.js
        uses: actions/setup-node@v4 # ✅ Fixed warning (updated to v4)
        with:
          node-version: "24" # Simplified version string

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # ✅ Fixed fatal error (added 'run')

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4 # ✅ Fixed warning

      - name: Use Node.js
        uses: actions/setup-node@v4 # ✅ Fixed warning
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # ✅ Fixed fatal error

      # Configure SSH securely for ED25519
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Deploy to EC2
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Create deployment directory
          ssh -i ~/.ssh/id_ed25519 $EC2_USER@$EC2_HOST "mkdir -p ~/app"

          # Copy files to EC2 instance
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            . $EC2_USER@$EC2_HOST:~/app/

          # Execute deployment commands safely
          ssh -i ~/.ssh/id_ed25519 $EC2_USER@$EC2_HOST << 'EOF'
            export PATH=$HOME/.local/share/fnm:$PATH
            eval "`fnm env`"
            
            cd ~/app
            
            npm install --production
            
            pm2 restart amkov-server || pm2 start dist/server.js --name amkov-server
            
            pm2 save
          EOF
