name: Deploy on EC2

on:
  push:
    branches: ['main', 'deploy']
  pull_request:
    branches: ['main', 'deploy']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # ✅ Fixed warning (updated to v4)

      - name: Use Node.js
        uses: actions/setup-node@v4 # ✅ Fixed warning (updated to v4)
        with:
          node-version: '24' # Simplified version string

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # ✅ Fixed fatal error (added 'run')

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4 # ✅ Fixed warning

      - name: Use Node.js
        uses: actions/setup-node@v4 # ✅ Fixed warning
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # ✅ Fixed fatal error

      # Configure SSH
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Deploy to EC2
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Create deployment directory
          ssh $EC2_USER@$EC2_HOST "mkdir -p ~/app"

          # Copy files to EC2 instance (including the compiled dist folder)
          rsync -avz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            . $EC2_USER@$EC2_HOST:~/app/

          # ✅ Execute deployment commands safely in one SSH session
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            # Load fnm and node environments explicitly so we don't need hardcoded paths
            export PATH=$HOME/.local/share/fnm:$PATH
            eval "`fnm env`"
            
            cd ~/app
            
            # Install production dependencies
            npm install --production
            
            # Restart PM2 if it exists, otherwise start it fresh
            pm2 restart amkov-server || pm2 start dist/server.js --name amkov-server
            
            # Save the pm2 state
            pm2 save
          EOF